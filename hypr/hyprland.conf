
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# autogenerated = 1 # remove this line to remove the warning

# Prioritize the Intel Integrated GPU for Hyprland itself
# env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:00:02.0-card

# Essential NVIDIA Environment Variables for Wayland/Hyprland
# env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, preferred, auto, 1.33
# monitor = HDMI-A-5, preferred, auto, 1.33
monitor = , preferred, auto, 1, mirror, eDP-1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = waybar
exec-once = swww init
# exec-once = hyprpaper
# & hyprpaper

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$clipboard = rofi -modi "clipboard:greenclip print" -show clipboard -run-command '{cmd}'

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us,ara
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    repeat_rate=50
    repeat_delay=250

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# dwindle {
#     # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
#     pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
#     preserve_split = yes # you probably want this
# }

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

# gestures {
#     # See https://wiki.hyprland.org/Configuring/Variables/ for more
#     workspace_swipe = off
# }

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = animation, ^(flameshot)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# windowrule = noanim,class:^(flameshot)$,title:^(flameshot)$
# windowrule = noanim,class:^(rofi)$,title:^(rofi)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrule = suppressevent maximize, class:.* # You'll probably like this.

workspace = special:gromit, gapsin:0, gapsout:0, on-created-empty: gromit-mpx -a
# windowrule = noblur,class:^(Gromit-mpx)$
# windowrule = opacity 1 override, 1 override, class:^(Gromit-mpx)$
# windowrule = noshadow, class:^(Gromit-mpx)$
bind = SUPERALT, G, exec, gromit-mpx
bind = , F8, exec, gromit-mpx --undo
bind = SHIFT , F8, exec, gromit-mpx --redo


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = CONTROLALT
$secondMod = CONTROLSUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# Applications
bind = $mainMod, T, exec, $terminal
bind = SUPER, R, exec, $menu
bind = SUPER, V, exec, $clipboard
bind = SUPER, P, exec, ~/.config/rofi/rofi-screen-managment/screen-manager.sh
# bind = $secondMod, W, exec, kitty -e nmtui
# bind = $secondMod, B, exec, kitty -e bluetui
bind = $mainMod, DELETE, exec, rofi -show power-menu -modi power-menu:~/.config/rofi/rofi-power-menu -font='JetBrainsMonoNL NFP:style=Regular'
bind = $secondMod, W, exec, ~/.config/rofi/rofi-wifi-menu
bind = $secondMod, B, exec, ~/.config/rofi/rofi-bluetooth-menu
bind = $mainMod, D, exec, kitty -e ~/.config/i3/scripts/tmux.sh
bind = CTRL, Escape, exec, kitty -e htop

bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-mute @DEFAULT_SINK@ false && pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = ,XF86AudioMicMute, exec, pactl -- set-source-mute 0 toggle

bind = ,XF86MonBrightnessDown, exec, brightnessctl s 10%- && brightnessctl s 10%- --device=intel_backlight
bind = ,XF86MonBrightnessUp, exec, brightnessctl s +10% && brightnessctl s +10% --device=intel_backlight


bind = ,Print, exec, export USE_WAYLAND_GRIP=true; flameshot gui

bind = ALT, F4, killactive,

bind = $mainMod, M, exit,
bind = $secondMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, o, togglesplit, # dwindle

# Move focus with mainMod + vim keys
bind = $mainMod, l, movefocus, r
bind = $mainMod, h, movefocus, l
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window with secondMod + vim keys
bind = $secondMod, l, movewindow, r
bind = $secondMod, h, movewindow, l
bind = $secondMod, k, movewindow, u
bind = $secondMod, j, movewindow, d

# Toggle fullscreen
bind = $mainMod, F, fullscreen

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with secondMod + [0-9]
bind = $secondMod, 1, movetoworkspace, 1
bind = $secondMod, 2, movetoworkspace, 2
bind = $secondMod, 3, movetoworkspace, 3
bind = $secondMod, 4, movetoworkspace, 4
bind = $secondMod, 5, movetoworkspace, 5
bind = $secondMod, 6, movetoworkspace, 6
bind = $secondMod, 7, movetoworkspace, 7
bind = $secondMod, 8, movetoworkspace, 8
bind = $secondMod, 9, movetoworkspace, 9
bind = $secondMod, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
